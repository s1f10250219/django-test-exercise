{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>タスクを編集 - To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
    <script src="{% static 'todo/theme.js' %}"></script>
  </head>

  <body>
    <!-- テーマ切り替えボタン -->
    <button id="theme-toggle" class="theme-toggle" title="テーマを切り替え">🌙</button>

    <!-- メインコンテンツ全体を包むコンテナ -->
    <main class="container">
      <h1>タスクを編集</h1>
      <p class="description">以下のフォームからタスクを編集できます。</p>
      
      {% if error_message %}
      <p class="form-error">{{ error_message }}</p>
      {% endif %}

      <!-- 編集フォーム -->
      <form action="{% url 'update' task.id %}" method="post" class="add-form">
        {% csrf_token %}
        <div class="form-group">
          <label for="titleInput">タイトル</label>
          <input id="titleInput" name="title" type="text" placeholder="タイトルを入力" value="{{ task.title }}">
        </div>

        <div class="form-group">
          <label for="dueInput">期限</label>
          <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at|date:'Y-m-d\TH:i' }}">
        </div>

        <div class="form-group">
          <label for="categoryInput">カテゴリ</label>
          <select id="categoryInput" name="categories" multiple size="4">
            {% for category in categories %}
            <option value="{{ category.name }}" {% if category.name in selected_categories %}selected{% endif %}>{{ category.name }}</option>
            {% endfor %}
          </select>
          <div class="form-help">複数選択できます</div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">更新</button>
          <a href="{% url 'index' %}" class="btn-link">キャンセル</a>
        </div>
      </form>
    </main>
  </body>

</html>
